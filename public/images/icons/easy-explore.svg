<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <!-- Compass circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#3F4F47" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#3F4F47" stroke-width="1.5"/>
  
  <!-- Cardinal directions -->
  <!-- North (top) -->
  <path d="M 32 12 L 28 20 M 32 12 L 36 20" stroke="#3F4F47" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="32,12 28,20 36,20" fill="#3F4F47" opacity="0.6"/>
  
  <!-- East (right) -->
  <path d="M 52 32 L 44 28 M 52 32 L 44 36" stroke="#3F4F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- South (bottom) -->
  <path d="M 32 52 L 28 44 M 32 52 L 36 44" stroke="#3F4F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- West (left) -->
  <path d="M 12 32 L 20 28 M 12 32 L 20 36" stroke="#3F4F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#3F4F47"/>
</svg>
